<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ffab00"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="url(#bg)"/>

  <!-- Sun circle -->
  <circle cx="40" cy="26" r="10" fill="url(#sun)"/>

  <!-- Sun rays -->
  <line x1="40" y1="10" x2="40" y2="5"  stroke="#ffd740" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="14" x2="57" y2="10" stroke="#ffd740" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="61" y1="26" x2="66" y2="26" stroke="#ffd740" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="14" x2="23" y2="10" stroke="#ffd740" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="26" x2="14" y2="26" stroke="#ffd740" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stem -->
  <path d="M40 36 Q40 50 40 62" stroke="#8bc34a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Left leaf -->
  <path d="M40 52 Q28 44 24 48 Q27 57 40 56" fill="#8bc34a"/>
  <!-- Right leaf -->
  <path d="M40 44 Q52 36 56 40 Q53 50 40 52" fill="#a5d6a7"/>
  <!-- Small left leaf -->
  <path d="M40 42 Q30 36 27 39 Q30 46 40 44" fill="#c8e6c9"/>

  <!-- Brand name -->
  <text x="90" y="34" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#1b5e20">Нерӯи</text>
  <text x="90" y="60" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#8bc34a">Тоза</text>

  <!-- Tagline -->
  <text x="90" y="74" font-family="Montserrat, Arial, sans-serif" font-size="9" fill="#78909c" letter-spacing="1.5">ЭНЕРГИЯИ ТОЗА • ТОҶИКИСТОН</text>
</svg>
